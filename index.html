<!DOCTYPE html>
<html>
<head>
  <title>🌌 AstroMitra AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:linear-gradient(135deg,#0c0c2e 0%,#1a1a3e 50%,#2d1b69 100%);color:#e0e0ff;min-height:100vh}.container{max-width:700px;margin:0 auto;padding:20px}.chat-container{background:rgba(255,255,255,0.05);border-radius:20px;padding:20px;height:60vh;overflow-y:auto;backdrop-filter:blur(10px);margin:20px 0}.message{margin:10px 0;padding:12px;border-radius:15px;max-width:85%;word-wrap:break-word}.user{background:linear-gradient(135deg,#667eea,#764ba2);margin-left:auto}.ai{background:rgba(255,255,255,0.1);border-left:3px solid #00d4ff}.input-group{display:flex;gap:10px}.input-group input{flex:1;padding:15px;border:2px solid rgba(255,255,255,0.2);border-radius:25px;background:rgba(255,255,255,0.1);color:white;font-size:16px}.input-group input:focus{outline:none;border-color:#00d4ff}.input-group button{padding:15px 25px;background:linear-gradient(135deg,#00d4ff,#0099cc);border:none;border-radius:25px;color:white;cursor:pointer;font-weight:bold;transition:transform .2s}.input-group button:hover{transform:scale(1.05)}button:disabled{opacity:.5;cursor:not-allowed}h1{text-align:center;margin:20px 0;font-size:2.2em}.mood{font-size:12px;opacity:.8;margin-top:5px}
  </style>
</head>
<body>
  <div class="container">
    <h1>🌌 AstroMitra AI</h1>
    <div class="chat-container" id="chat"></div>
    <div class="input-group">
      <input id="input" placeholder="What's on your mind, cosmic traveler? 🌑" />
      <button onclick="send()">Send 🚀</button>
    </div>
  </div>
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    input.focus();
    input.onkeypress = e => e.key=='Enter'&&send();
    async function send(){
      const msg = input.value.trim();
      if(!msg){input.focus();return;}
      add(msg,'user'); input.value=''; input.disabled=true;
      try{
        const res = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
        const data = await res.json();
        add(data.reply,'ai',data.mood);
      }catch(e){add('🌌 Connection lost...','ai');}
      input.disabled=false; input.focus();
    }
    function add(text,cls,mood){
      const div = document.createElement('div');
      div.className=`message ${cls}`;
      div.innerHTML=`<strong>${cls=='user'?'You':'AstroMitra'}</strong><br>${text}${mood?`<div class="mood">😊 ${mood}</div>`:''}`;
      chat.appendChild(div); chat.scrollTop=chat.scrollHeight;
    }
  </script>
</body>
</html>
